name: Release

on:
  push:
    paths:
      - .github/workflows/release.yml
  workflow_dispatch:
    inputs:
      next_version:
        description: Version segment to advance after this release
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: Mark the GitHub release as prerelease
        required: true
        default: false
        type: boolean
      draft:
        description: Create the GitHub release as a draft
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  index:
    name: Index Workflow
    if: github.event_name == 'push'
    runs-on: windows-latest
    steps:
      - name: Indexed
        run: echo "Release workflow is available from workflow_dispatch."

  release:
    name: Build And Publish
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Master
        shell: pwsh
        run: |
          git fetch origin master
          git checkout -B master origin/master

      - name: Resolve Version
        id: version
        shell: pwsh
        run: |
          $toml = Get-Content Cargo.toml -Raw
          if ($toml -notmatch '(?m)^version\s*=\s*"([^"]+)"\s*$') {
            throw "Cargo.toml does not contain a package version."
          }
          $snapshotVersion = $Matches[1]
          if ($snapshotVersion -notmatch '^(\d+)\.(\d+)\.(\d+)-SNAPSHOT$') {
            throw "Cargo.toml version '$snapshotVersion' is not a release snapshot. Use values like 1.1.2-SNAPSHOT."
          }

          $major = [int]$Matches[1]
          $minor = [int]$Matches[2]
          $patch = [int]$Matches[3]
          $version = "$major.$minor.$patch"
          $nextVersion = switch ("${{ inputs.next_version }}") {
            "patch" { "$major.$minor.$($patch + 1)-SNAPSHOT" }
            "minor" { "$major.$($minor + 1).0-SNAPSHOT" }
            "major" { "$($major + 1).0.0-SNAPSHOT" }
            default { throw "Unsupported next_version '${{ inputs.next_version }}'." }
          }

          $existingTag = git tag --list "v$version"
          if ($existingTag) {
            throw "Tag v$version already exists."
          }

          "release_version=$version" >> $env:GITHUB_OUTPUT
          "next_snapshot_version=$nextVersion" >> $env:GITHUB_OUTPUT
          "HYPERX_BUILD_VERSION=$version" >> $env:GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Set Release Version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.release_version }}"
          $toml = Get-Content Cargo.toml -Raw
          $toml = $toml -replace '(?m)^version\s*=\s*"[^"]+"\s*$', "version = `"$version`""
          Set-Content Cargo.toml -Value $toml -NoNewline
          cargo check --all-targets

      - name: Format Check
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --all-targets --locked

      - name: Build Release
        run: cargo build --release --locked

      - name: Package
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.release_version }}"
          $name = "hyperx-mic-lite-v$version-windows-x86_64-msvc"
          if (Test-Path "dist") { Remove-Item "dist" -Recurse -Force }
          $dist = Join-Path $PWD "dist\$name"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item "target\release\hyperx-mic-lite.exe" $dist
          $zip = Join-Path $PWD "dist\$name.zip"
          if (Test-Path $zip) { Remove-Item $zip }
          Compress-Archive -Path "$dist\*" -DestinationPath $zip
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksum = "$hash  $name.zip"
          Set-Content -Path "$zip.sha256" -Value $checksum
          "zip=$zip" >> $env:GITHUB_OUTPUT
          "sha=$zip.sha256" >> $env:GITHUB_OUTPUT
          "asset_name=$name.zip" >> $env:GITHUB_OUTPUT

      - name: Commit Release Version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.release_version }}"
          git config user.name "anonymous"
          git config user.email "anonymous@example.invalid"
          git add Cargo.toml Cargo.lock
          git commit -m "Release v$version"
          git pull --rebase origin master
          git tag -a "v$version" -m "Release v$version"
          git push origin HEAD:master
          git push origin "v$version"

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset_name }}
          path: |
            ${{ steps.package.outputs.zip }}
            ${{ steps.package.outputs.sha }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.release_version }}
          name: HyperX Mic Lite v${{ steps.version.outputs.release_version }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.zip }}
            ${{ steps.package.outputs.sha }}

      - name: Start Next Snapshot
        shell: pwsh
        run: |
          git pull --rebase origin master
          $version = "${{ steps.version.outputs.next_snapshot_version }}"
          $toml = Get-Content Cargo.toml -Raw
          $toml = $toml -replace '(?m)^version\s*=\s*"[^"]+"\s*$', "version = `"$version`""
          Set-Content Cargo.toml -Value $toml -NoNewline
          cargo check --all-targets
          git add Cargo.toml Cargo.lock
          git commit -m "Start v$version"
          git pull --rebase origin master
          git push origin HEAD:master
